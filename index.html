<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Skipper | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style_index.css">
</head>
<body>
    <div class="headline">
        <div class="logo_headline">
        <h1 class="logo_writing"><span class="logo_writing_Sky">Sky</span> Skipper</h1>
        <img class="logo" src="img/bird_blue0.png" alt="Logo">
        </div>

        <div>
            <a class="home" href="index.html">Home</a>
        </div>

        <div class="info_downloads">
            <select class="language-selector" name="language" id="language" onchange="location.href=this.value">
                <!-- use plain values, anchors inside options are invalid HTML -->
                <option value="index.html">English</option>
                <option value="index_de.html">Deutsch</option>
            </select>
            <a class="info" href="info_en.html">Info</a>
            <a class="downloads" href="downloads_en.html">Downloads</a>
        </div>
    </div>

    <div>
        <span class="little_instruction">
            Hello! In this game, you are a bird flying through the air and avoiding obstacles. Your goal is to fly as far as possible without hitting the obstacles. The further you get, the higher your score will be. Have fun playing!
        </span>
    </div>

    <div>
        <img class="screenshot" src="img/Screenshot.png" alt="Screenshot">
    </div>
</body>
</html>
